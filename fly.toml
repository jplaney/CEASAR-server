# fly.toml app configuration file generated for ceasar-server on 2026-05-06T19:34:08Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "ceasar-server"
primary_region = "ord"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
